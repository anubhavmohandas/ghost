<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GHOST — Dictation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1333;
      color: #e2d9f3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #241b44;
      border: 1px solid #3d2d6e;
      border-radius: 18px;
      padding: 2.5rem 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #c084fc;
      letter-spacing: 0.12em;
      margin-bottom: 0.25rem;
    }
    .logo span { color: #fb923c; }

    .subtitle {
      font-size: 0.8rem;
      color: #7c6aaa;
      margin-bottom: 2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Progress */
    .progress-wrap {
      background: #1a1333;
      border-radius: 99px;
      height: 6px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #fb923c);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Mic orb */
    .orb-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 1.5rem;
    }
    .orb {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #7c3aed, #3b1d7a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      position: relative;
      z-index: 1;
      transition: transform 0.2s;
    }
    .orb.listening {
      animation: pulse-orb 1.2s ease-in-out infinite;
    }
    .orb.done-orb { background: radial-gradient(circle at 35% 35%, #16a34a, #064e1e); }
    .orb.error-orb { background: radial-gradient(circle at 35% 35%, #dc2626, #7f1d1d); }

    @keyframes pulse-orb {
      0%, 100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.5); transform: scale(1); }
      50%       { box-shadow: 0 0 0 18px rgba(124,58,237,0); transform: scale(1.04); }
    }

    /* Field display */
    .field-label {
      font-size: 0.75rem;
      color: #7c6aaa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .field-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e2d9f3;
      margin-bottom: 0.5rem;
    }
    .field-value {
      font-size: 1rem;
      color: #c084fc;
      min-height: 1.5rem;
      margin-bottom: 1.5rem;
      font-style: italic;
    }

    .status {
      font-size: 0.85rem;
      color: #9d8cc4;
      margin-bottom: 1.5rem;
      min-height: 1.2rem;
    }
    .status.err { color: #f87171; }
    .status.ok  { color: #4ade80; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }
    button {
      padding: 0.55rem 1.4rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: default; }

    .btn-skip {
      background: #2d2060;
      color: #c084fc;
      border: 1px solid #3d2d6e;
    }
    .btn-stop {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #991b1b;
    }
    .btn-close {
      background: #16a34a;
      color: #dcfce7;
    }

    /* Step list */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-top: 1.5rem;
      text-align: left;
      max-height: 160px;
      overflow-y: auto;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: #7c6aaa;
      padding: 0.2rem 0;
    }
    .step.current { color: #c084fc; font-weight: 600; }
    .step.done    { color: #4ade80; }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3d2d6e;
      flex-shrink: 0;
    }
    .step.current .step-dot { background: #c084fc; }
    .step.done    .step-dot { background: #4ade80; }

    /* Mic level meter */
    .mic-meter {
      display: none;
      margin: 0.75rem auto 0.5rem;
      background: #1a1333;
      border-radius: 99px;
      height: 8px;
      width: 80%;
      overflow: hidden;
    }
    .mic-bar {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #7c3aed, #fb923c);
      transition: width 0.05s linear;
    }
    .mic-label {
      font-size: 0.7rem;
      color: #7c6aaa;
      margin-bottom: 0.5rem;
      display: none;
    }

    /* Text fallback input */
    .text-input {
      display: none;
      width: 100%;
      margin: 0.75rem 0 0.5rem;
      padding: 0.6rem 0.9rem;
      background: #1a1333;
      border: 1px solid #3d2d6e;
      border-radius: 8px;
      color: #e2d9f3;
      font-size: 0.9rem;
    }
    .text-input:focus { outline: none; border-color: #7c3aed; }
    .btn-text-submit {
      display: none;
      background: #7c3aed;
      color: #fff;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👻 <span>GHOST</span></div>
    <div class="subtitle">Profile Setup <span id="voiceBadge" style="color:#c084fc;font-size:0.75rem;margin-left:0.4rem;">+ Voice</span></div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>

    <div class="orb-wrap">
      <div class="orb listening" id="orb">🎤</div>
    </div>

    <div class="field-label" id="fieldLabel">Starting…</div>
    <div class="field-name"  id="fieldName">—</div>

    <div class="mic-meter" id="micMeter"><div class="mic-bar" id="micBar"></div></div>
    <div class="mic-label" id="micLabel">Mic level — if bar doesn't move when you speak, check your mic</div>

    <div class="status" id="status">Starting…</div>

    <input  class="text-input"     id="textInput"  type="text" style="display:none" />
    <button class="btn-text-submit" id="textSubmit" style="display:none">Next ↵</button>

    <div class="btn-row" id="btnRow">
      <button class="btn-skip" id="skipBtn">Skip field</button>
      <button class="btn-stop" id="stopBtn">Stop</button>
    </div>

    <div class="steps" id="stepsList"></div>
  </div>

  <script src="dictation.js"></script>
</body>
</html>
