<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GHOST — Dictation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0c24;
      color: #e2d9f3;
      min-height: 100vh;
      display: flex;
    }

    .layout { display: flex; width: 100%; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: 210px;
      background: #100c28;
      border-right: 1px solid #2e2060;
      padding: 1.25rem 0;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 0.62rem;
      color: #5a4a9a;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0 1rem 0.6rem;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .step:hover { background: #150f30; }
    .step.current { background: #1e1640; }
    .step-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2a1e5a;
      flex-shrink: 0;
    }
    .step.done    .step-dot { background: #4ade80; }
    .step.current .step-dot { background: #a78bfa; box-shadow: 0 0 6px #a78bfa88; }
    .step-label {
      font-size: 0.75rem;
      color: #6a5a9a;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .step.done    .step-label { color: #4ade80; }
    .step.current .step-label { color: #c4b5fd; font-weight: 600; }
    .step-val {
      font-size: 0.62rem;
      color: #3a2a60;
      white-space: nowrap;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .step.done .step-val { color: #166534; }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      gap: 0;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      color: #a78bfa;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    .logo span { color: #fb923c; }

    .progress-wrap {
      width: 100%;
      max-width: 460px;
      background: #1a1440;
      border-radius: 99px;
      height: 4px;
      margin-bottom: 2.5rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #fb923c);
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .field-card {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    /* ── Orb ── */
    .orb {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #7c3aed, #3b1d7a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.25rem;
      cursor: pointer;
      transition: transform 0.15s;
      user-select: none;
    }
    .orb:hover { transform: scale(1.06); }
    .orb:active { transform: scale(0.96); }
    .orb.listening {
      animation: pulse 1.2s ease-in-out infinite;
      background: radial-gradient(circle at 35% 35%, #9333ea, #4c1d95);
    }
    .orb.heard { background: radial-gradient(circle at 35% 35%, #16a34a, #064e1e); }
    .orb.off   { background: radial-gradient(circle at 35% 35%, #374151, #111827); cursor: default; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.5); transform: scale(1); }
      50%      { box-shadow: 0 0 0 14px rgba(124,58,237,0); transform: scale(1.05); }
    }

    .field-num  { font-size: 0.7rem; color: #4a3a80; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.4rem; }
    .field-name { font-size: 1.9rem; font-weight: 700; color: #e2d9f3; margin-bottom: 0.3rem; line-height: 1.2; }
    .field-hint { font-size: 0.75rem; color: #4a3a80; margin-bottom: 1.2rem; min-height: 1rem; }

    .status {
      font-size: 0.8rem;
      color: #6a5a9a;
      margin-bottom: 1rem;
      min-height: 1.2rem;
      transition: color 0.2s;
    }

    .text-input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: #1a1440;
      border: 1.5px solid #2e2060;
      border-radius: 10px;
      color: #e2d9f3;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 1rem;
    }
    .text-input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.18); }
    .text-input::placeholder { color: #3a2a60; }

    /* System dictation tip */
    .sys-tip {
      background: #0e1f2e;
      border: 1px solid #1e4060;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.78rem;
      color: #7dd3fc;
      margin-bottom: 1rem;
      text-align: left;
      line-height: 1.6;
      position: relative;
    }
    .sys-tip strong { color: #bae6fd; display: block; margin-bottom: 0.25rem; }
    .sys-tip kbd {
      background: #1e3a5f; border: 1px solid #2563eb;
      border-radius: 4px; padding: 1px 5px;
      font-size: 0.72rem; color: #93c5fd;
    }
    #dismissTip {
      position: absolute; top: 0.5rem; right: 0.6rem;
      background: none; border: none; color: #4a7a9a;
      cursor: pointer; font-size: 0.9rem; padding: 0;
    }

    /* Kbd hints */
    .kbd-hints {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .kbd-hint { display: flex; align-items: center; gap: 0.3rem; font-size: 0.68rem; color: #3a2a70; }
    kbd {
      background: #1a1440; border: 1px solid #2e2060;
      border-radius: 4px; padding: 1px 5px;
      font-size: 0.65rem; color: #6a5a9a; font-family: inherit;
    }

    .btn-row { display: flex; gap: 0.6rem; justify-content: center; }
    button { padding: 0.45rem 1.1rem; border-radius: 8px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: opacity 0.15s, transform 0.1s; }
    button:active { transform: scale(0.97); }
    .btn-skip { background: #1e1640; color: #6a5a9a; border: 1px solid #2e2060; }
    .btn-stop { background: #3f0d0d; color: #fca5a5; border: 1px solid #7f1d1d; }
    .btn-skip:hover { background: #2a1e5a; }
    .btn-stop:hover { background: #7f1d1d; }

    /* Done panel */
    .done-panel { display: none; flex-direction: column; align-items: center; gap: 0.75rem; text-align: center; }
    .done-icon { font-size: 3rem; }
    .done-title { font-size: 1.4rem; font-weight: 700; color: #4ade80; }
    .done-sub { font-size: 0.82rem; color: #4a3a80; }
    .btn-close { margin-top: 0.5rem; background: #16a34a; color: #dcfce7; padding: 0.5rem 1.5rem; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">Fields</div>
    <div id="stepsList"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="logo">👻 <span>GHOST</span></div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Active panel -->
    <div class="field-card" id="mainPanel">
      <div class="orb" id="orb" title="Click to re-listen">🎤</div>

      <div class="field-num"  id="fieldNum">1 / 29</div>
      <div class="field-name" id="fieldName">—</div>
      <div class="field-hint" id="fieldHint"></div>

      <div class="status" id="status">Starting…</div>

      <!-- System dictation tip -->
      <div class="sys-tip" id="sysTip">
        <button id="dismissTip" title="Dismiss">✕</button>
        <strong>🎙️ Use macOS dictation — press Fn Fn</strong>
        Double-tap the <kbd>Fn</kbd> key → speak → it types here automatically.<br>
        Then press <kbd>Enter</kbd> to save and move to next field.
      </div>

      <input class="text-input" id="textInput" type="text"
             autocomplete="off" spellcheck="false" placeholder="Say or type your answer…" />

      <div class="kbd-hints">
        <span class="kbd-hint"><kbd>Enter</kbd>/<kbd>Tab</kbd> save & next</span>
        <span class="kbd-hint"><kbd>⇧Tab</kbd> go back</span>
        <span class="kbd-hint"><kbd>Esc</kbd> skip</span>
        <span class="kbd-hint">Click 🎤 to re-listen</span>
      </div>

      <div class="btn-row">
        <button class="btn-skip" id="skipBtn">Skip</button>
        <button class="btn-stop" id="stopBtn">Stop &amp; Save</button>
      </div>
    </div>

    <!-- Done panel -->
    <div class="done-panel" id="donePanel">
      <div class="done-icon">✅</div>
      <div class="done-title">Profile updated!</div>
      <div class="done-sub" id="savedCount"></div>
      <div class="done-sub">Closing in 3 seconds…</div>
      <button class="btn-close" id="closeBtn">Close now</button>
    </div>
  </main>

</div>
<script src="dictation.js"></script>
</body>
</html>
