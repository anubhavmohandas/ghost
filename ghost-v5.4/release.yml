name: Release

# Trigger: push a tag like  git tag v5.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Chrome zip (MV3)
        run: |
          zip -r ghost-${{ steps.ver.outputs.VERSION }}-chrome.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.bat" \
            --exclude "*.sh" \
            --exclude "manifest-firefox.json" \
            --exclude "*.DS_Store"

      - name: Build Firefox zip (MV2)
        run: |
          # Swap in the Firefox manifest
          cp manifest.json manifest-chrome-backup.json
          cp manifest-firefox.json manifest.json
          zip -r ghost-${{ steps.ver.outputs.VERSION }}-firefox.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.bat" \
            --exclude "*.sh" \
            --exclude "manifest-chrome-backup.json" \
            --exclude "*.DS_Store"
          # Restore Chrome manifest
          mv manifest-chrome-backup.json manifest.json

      - name: Build macOS tarball
        run: |
          tar -czf ghost-${{ steps.ver.outputs.VERSION }}-mac.tar.gz \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "*.bat" \
            --exclude "manifest-firefox.json" \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GHOST v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## GHOST v${{ steps.ver.outputs.VERSION }}

            ### Install
            | Platform | File | How |
            |---|---|---|
            | Chrome / Edge / Brave | `*-chrome.zip` | Extract → `chrome://extensions` → Load unpacked |
            | Firefox | `*-firefox.zip` | `about:debugging` → Load Temporary Add-on → select `manifest.json` |
            | macOS | `*-mac.tar.gz` | Extract → load via Chrome or Firefox as above |

            ### Update (if already installed)
            ```bash
            ./update.sh   # macOS / Linux
            update.bat    # Windows
            ```

            See [README](https://github.com/anubhavmohandas/GHOST#version-history) for full changelog.
          files: |
            ghost-${{ steps.ver.outputs.VERSION }}-chrome.zip
            ghost-${{ steps.ver.outputs.VERSION }}-firefox.zip
            ghost-${{ steps.ver.outputs.VERSION }}-mac.tar.gz
          draft: false
          prerelease: false
